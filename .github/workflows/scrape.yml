name: Scrape Jobs

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout dev repo (scraper code)
        uses: actions/checkout@v4.2.2
        with:
          path: scraper

      - name: Checkout jobs repo (public data)
        uses: actions/checkout@v4.2.2
        with:
          repository: vanshsinhaa/jobs
          token: ${{ secrets.JOBS_REPO_TOKEN }}
          path: jobs

      - name: Set up Go
        uses: actions/setup-go@v5.5.0
        with:
          go-version-file: scraper/go.mod
          cache-dependency-path: scraper/go.sum

      - name: Run scraper
        working-directory: scraper
        env:
          DATA_DIR: ${{ github.workspace }}/jobs/local_data
          README_PATH: ${{ github.workspace }}/jobs/README.md
          TARGET_README_PATH: ${{ github.workspace }}/scraper/README.md
          TARGET_COMPANIES_FILE: ${{ github.workspace }}/scraper/local_data/target_companies.json
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: go run main.go

      - name: Commit and push to jobs repo
        working-directory: jobs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md local_data/job_ids.json local_data/jobs.json
          git diff --staged --quiet || git commit -m "update: jobs $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Commit target feed to dev repo
        working-directory: scraper
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "update: target feed $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
